<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Solid background on first paint; avoids flash of legacy SVG background. -->
    <style>
      body {
        background-color: var(--background, #fff);
        background-image: none;
      }
      /* Fallback matches theme.css dark --background when vars are not loaded yet. */
      html.dark body {
        background-color: var(--background, oklch(0.145 0 0));
      }
    </style>
    <script>
      (function() {
        var app = document.querySelector('meta[name="mochi:app"]')
        var fp = document.querySelector('meta[name="mochi:fingerprint"]')
        var domain = document.querySelector('meta[name="mochi:domain"]')
        var base = '/'
        if (domain) base = '/'
        else if (fp && app) base = '/' + app.content + '/' + fp.content + '/'
        else if (fp) base = '/' + fp.content + '/'
        else if (app) base = '/' + app.content + '/'
        else { var m = location.pathname.match(/^\/([^/]+)/); if (m) base = '/' + m[1] + '/' }
        var el = document.createElement('base')
        el.href = base
        document.head.appendChild(el)
      })()
    </script>
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Mochi</title>
    <meta name="title" content="Mochi" />
    <meta
      name="description"
      content="Mochi is the modern web operating system."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mochi" />
    <meta
      property="og:description"
      content="Mochi is the modern web operating system."
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Mochi" />
    <meta
      property="twitter:description"
      content="Mochi is the modern web operating system."
    />

    <meta name="theme-color" content="#fff" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
